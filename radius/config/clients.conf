#
# clients.conf - Allowed RADIUS clients (NAS devices)
#
# Replace the placeholders with your real Mikrotik / OLT IPs and
# share the same secret in your Mikrotik RADIUS profile.
#

client docker_internal {
    ipaddr  = 172.20.0.0/16
    secret  = ${RADIUS_SECRET:-radius_secret}
    require_message_authenticator = no
    nas_type = other
}

client localhost {
    ipaddr  = 127.0.0.1
    secret  = ${RADIUS_SECRET:-radius_secret}
    nas_type = other
}

